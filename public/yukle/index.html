<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Dosya Yükleme | Hepon Yönetim</title>
<style>
  body{font-family:system-ui,sans-serif;background:#0B1220;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box}
  .kutu{width:100%;max-width:440px;background:#fff;border-radius:20px;padding:30px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  h2{margin:0 0 4px;color:#13263D;font-size:21px}
  p{margin:0 0 18px;color:#6F7E90;font-size:13.5px}
  label{display:block;font-size:12.5px;font-weight:600;color:#6F7E90;margin:12px 0 5px}
  input[type=text],input[type=password]{width:100%;box-sizing:border-box;padding:11px 13px;border:1.5px solid #DFE8ED;border-radius:12px;font-size:15px;font-family:inherit}
  input:focus{outline:none;border-color:#30B6E4;box-shadow:0 0 0 4px rgba(48,182,228,.15)}
  .btn{width:100%;margin-top:16px;border:none;border-radius:999px;padding:13px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;background:#30B6E4;color:#fff}
  .btn:hover{background:#1883A8}
  .hata{display:none;background:#FDECEC;color:#D84C4C;border-radius:10px;padding:9px 12px;font-size:13px;margin-top:12px}
  .hata.goster{display:block}
  .birak{border:2px dashed #DFE8ED;border-radius:16px;padding:34px 16px;text-align:center;color:#6F7E90;font-size:14px;cursor:pointer;transition:border-color .15s,background .15s}
  .birak.ustunde{border-color:#30B6E4;background:#EAF7FC}
  .liste{margin-top:18px;font-size:13px;color:#13263D}
  .liste div{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid #EDF3F6}
  .liste span{color:#6F7E90}
  .tamam{background:#E4F7EF;color:#1DB586;border-radius:10px;padding:9px 12px;font-size:13px;margin-top:12px;display:none}
  .tamam.goster{display:block}
</style>
</head>
<body>
<div class="kutu">
  <div id="girisAlani">
    <h2>Dosya Yükleme</h2>
    <p>Tasarımcıdan gelen dosyaları buradan sunucuya bırakabilirsin. Yalnızca yönetici girişiyle çalışır.</p>
    <label>Kullanıcı adı</label><input type="text" id="kullanici" autocomplete="username">
    <label>Şifre</label><input type="password" id="sifre" autocomplete="current-password">
    <div class="hata" id="girisHata"></div>
    <button class="btn" id="girisBtn" type="button">Giriş yap</button>
  </div>
  <div id="yuklemeAlani" style="display:none">
    <h2>Dosya Yükleme</h2>
    <p>Dosyayı aşağıya sürükle ya da tıklayıp seç (en fazla 25 MB).</p>
    <div class="birak" id="birakAlani">Dosyayı buraya bırak<br>veya tıkla</div>
    <input type="file" id="dosyaSec" hidden multiple>
    <div class="tamam" id="sonucTamam"></div>
    <div class="hata" id="yuklemeHata"></div>
    <div class="liste" id="dosyaListe"></div>
  </div>
</div>
<script>
(() => {
  let token = sessionStorage.getItem("hepon_admin") || "";
  const el = (id) => document.getElementById(id);

  async function listele() {
    const r = await fetch("/api/admin/dosyalar", { headers: { "x-admin": token } }).then((x) => x.json());
    if (Array.isArray(r)) {
      el("dosyaListe").innerHTML = "<b>Sunucudaki dosyalar:</b>" + (r.slice(0, 10).map((d) =>
        `<div>${d.ad}<span>${(d.boyut / 1024).toFixed(0)} KB</span></div>`).join("") || "<div>henüz yok</div>");
    }
  }

  function panele() {
    el("girisAlani").style.display = "none";
    el("yuklemeAlani").style.display = "block";
    listele();
  }

  async function giris() {
    el("girisHata").classList.remove("goster");
    const r = await fetch("/api/admin/login", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: el("kullanici").value.trim(), password: el("sifre").value }),
    }).then((x) => x.json()).catch(() => null);
    if (!r || !r.token) {
      el("girisHata").textContent = (r && r.error) || "Giriş yapılamadı";
      el("girisHata").classList.add("goster");
      return;
    }
    token = r.token;
    sessionStorage.setItem("hepon_admin", token);
    panele();
  }
  el("girisBtn").addEventListener("click", giris);
  el("girisAlani").addEventListener("keydown", (e) => { if (e.key === "Enter") giris(); });

  async function yukle(dosyalar) {
    el("yuklemeHata").classList.remove("goster");
    el("sonucTamam").classList.remove("goster");
    for (const d of dosyalar) {
      const f = new FormData();
      f.append("dosya", d);
      const r = await fetch("/api/admin/dosya-yukle", {
        method: "POST", headers: { "x-admin": token }, body: f,
      }).then((x) => x.json()).catch(() => null);
      if (!r || !r.ok) {
        el("yuklemeHata").textContent = (r && r.error) || "Yükleme başarısız (dosya 25 MB'dan büyük olabilir)";
        el("yuklemeHata").classList.add("goster");
        return;
      }
      el("sonucTamam").textContent = `✓ Yüklendi: ${r.ad} (${(r.boyut / 1024).toFixed(0)} KB)`;
      el("sonucTamam").classList.add("goster");
    }
    listele();
  }

  const birak = el("birakAlani");
  birak.addEventListener("click", () => el("dosyaSec").click());
  el("dosyaSec").addEventListener("change", (e) => yukle(e.target.files));
  ["dragover", "dragenter"].forEach((t) => birak.addEventListener(t, (e) => { e.preventDefault(); birak.classList.add("ustunde"); }));
  ["dragleave", "drop"].forEach((t) => birak.addEventListener(t, (e) => { e.preventDefault(); birak.classList.remove("ustunde"); }));
  birak.addEventListener("drop", (e) => yukle(e.dataTransfer.files));

  if (token) fetch("/api/admin/dosyalar", { headers: { "x-admin": token } }).then((x) => x.json())
    .then((r) => { if (Array.isArray(r)) panele(); else sessionStorage.removeItem("hepon_admin"); });
})();
</script>
</body>
</html>
